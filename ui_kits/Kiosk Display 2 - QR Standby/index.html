<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flockr — Kiosk Display 2 · QR Standby</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; }
  html, body { width: 100%; height: 100%; }
  body { background: #050403; font-family: var(--font-body); overflow: hidden; }

  /* Fixed 460x940 logical canvas (design target), scaled to fit whatever the
     kiosk screen's actual resolution is — see fit() below. */
  .stage { position: absolute; top: 50%; left: 50%; width: 460px; height: 940px; transform-origin: center center; }
  .screen {
    width: 100%; height: 100%; overflow: hidden; position: relative;
    background:
      radial-gradient(circle at 50% 20%, var(--brand-800), var(--brand-950) 75%),
      radial-gradient(rgba(255,255,255,.06) 1px, transparent 1.4px);
    background-size: 100% 100%, 22px 22px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 34px;
  }

  .wm { position: absolute; width: 620px; height: 620px; top: -200px; left: -180px; opacity: .05; transform: rotate(-6deg); pointer-events: none; mix-blend-mode: screen; }
  .wm svg { width: 100%; height: 100%; }
  .wm path, .wm ellipse { fill: #fff; }

  .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; }

  .eyebrow { display: inline-flex; align-items: center; padding: 7px 14px; border-radius: 999px; background: rgba(255,255,255,.09); color: var(--gold-300); font: 700 11px var(--font-body); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 18px; animation: pulse 7s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: .9; } 50% { opacity: 1; } }

  .headline { font: 600 30px/1.15 var(--font-display); color: #fff; }
  .headline em { font-style: italic; font-weight: 500; color: var(--gold-300); }
  .body-copy { font: 15px/1.55 var(--font-body); color: var(--brand-100); max-width: 300px; margin: 14px 0 28px; }

  .qr-wrap { position: relative; }
  .scan-ring { position: absolute; inset: -14px; border-radius: 30px; border: 2px solid var(--gold-400); opacity: 0; animation: ring 2800ms cubic-bezier(.2,.7,.3,1) infinite; }
  @keyframes ring { 0% { opacity: .55; transform: scale(.96); } 80% { opacity: 0; transform: scale(1.08); } 100% { opacity: 0; } }
  .qr-card { background: #fff; border-radius: 22px; padding: 18px; box-shadow: 0 20px 50px rgba(0,0,0,.4); position: relative; animation: breathe 4400ms ease-in-out infinite; }
  @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.035); } }
  .qr-sq { width: 196px; height: 196px; border-radius: 8px; background: repeating-linear-gradient(45deg, #2b1a0c 0 6px, #efe6d9 6px 12px); display: flex; align-items: center; justify-content: center; color: #fff; font: 700 11px var(--font-body); text-align: center; }

  .fallback-url { font: 600 12px var(--font-body); color: var(--brand-100); margin-top: 14px; letter-spacing: .02em; }
  .fallback-url b { color: var(--gold-300); }

  .trust-strip { display: flex; gap: 26px; margin-top: 28px; }
  .stat { font: 700 22px/1 var(--font-display); color: #fff; }
  .stat-lbl { font: 600 11px var(--font-body); letter-spacing: .09em; color: var(--gold-300); margin-top: 4px; }

  @media (prefers-reduced-motion: reduce) { .eyebrow, .qr-card, .scan-ring { animation: none !important; } }
</style>
</head>
<body>

<div class="stage" id="stage">
<div class="screen">
  <div class="wm">
    <svg viewBox="0 0 54 52"><ellipse cx="26.6" cy="26" rx="26.6" ry="26"/><path d="M12.4 26.3C4.7 21.2 9.8 15.9 13.3 13.9C0.1 19.7 7.2 26.7 12.4 29.4C17.5 29.1 19.4 32.5 19.7 34.2L20.9 42.9L21.9 34.2C20.9 27.4 15.2 26.1 12.4 26.3Z" fill="#2b1a0c"/><path d="M40.7 26.3C48.2 21.2 43.2 15.9 39.8 13.9C52.8 19.7 45.8 26.7 40.7 29.4C35.7 29.1 33.8 32.5 33.5 34.2L32.3 42.9L31.3 34.2C32.3 27.4 38 26.1 40.7 26.3Z" fill="#2b1a0c"/></svg>
  </div>
  <div class="content">
    <img src="../../assets/logo/flockr-lockup-white.svg" style="height:26px;margin-bottom:30px" alt="Flockr">
    <div class="eyebrow">Scan to get started</div>
    <div class="headline">Get your free<br><em>Flockr guide.</em></div>
    <div class="body-copy">Fill in a few details on your phone. We'll send the full product guide, free.</div>
    <div class="qr-wrap">
      <div class="scan-ring"></div>
      <div class="qr-card"><div class="qr-sq">QR CODE<br>PLACEHOLDER</div></div>
    </div>
    <div class="fallback-url">or go to <b>flockr.africa/guide</b></div>
    <div class="trust-strip">
      <div><div class="stat">5+</div><div class="stat-lbl">COUNTRIES</div></div>
      <div><div class="stat">US$210B</div><div class="stat-lbl">ECONOMY</div></div>
    </div>
  </div>
</div>
</div>

<script>
function fit() {
  const stage = document.getElementById('stage');
  const scale = Math.min(window.innerWidth / 460, window.innerHeight / 940);
  stage.style.transform = `translate(-50%, -50%) scale(${scale})`;
}
window.addEventListener('resize', fit);
fit();
</script>
</body>
</html>
