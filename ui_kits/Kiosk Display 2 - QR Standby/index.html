<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flockr — Kiosk Display 2 · QR Standby</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; }
  html, body { width: 100%; height: 100%; }
  body { background: #ECE0CC; font-family: var(--font-body); overflow: hidden; }

  /* Fixed 460x940 logical canvas (design target), scaled to fit whatever the
     kiosk screen's actual resolution is — see fit() below. */
  .stage { position: absolute; top: 50%; left: 50%; width: 460px; height: 940px; transform-origin: center center; }
  .screen {
    width: 100%; height: 100%; overflow: hidden; position: relative;
    background:
      radial-gradient(circle at 50% 20%, var(--gold-100), var(--cream-0) 75%),
      radial-gradient(rgba(116,66,20,.12) 1px, transparent 1.4px);
    background-size: 100% 100%, 22px 22px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 34px;
  }

  .wm { position: absolute; width: 620px; height: 620px; top: -200px; left: -180px; opacity: .05; transform: rotate(-6deg); pointer-events: none; }
  .wm svg { width: 100%; height: 100%; }
  .wm path, .wm ellipse { fill: var(--brand-600); }

  .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; }

  .eyebrow { display: inline-flex; align-items: center; padding: 7px 14px; border-radius: 999px; background: rgba(116,66,20,.08); color: var(--gold-700); font: 700 11px var(--font-body); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 18px; animation: pulse 7s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: .9; } 50% { opacity: 1; } }

  .headline { font: 600 30px/1.25 var(--font-display); color: var(--text-primary); margin-bottom: 4px; }
  .headline em { font-style: italic; font-weight: 500; color: var(--gold-600); }
  .body-copy { font: 15px/1.55 var(--font-body); color: var(--text-secondary); max-width: 300px; margin: 24px 0 28px; }

  .qr-wrap { position: relative; }
  .qr-card { background: #fff; border-radius: 20px; padding: 10px; box-shadow: 0 20px 50px rgba(116,66,20,.18), 0 0 0 1px var(--border-subtle); position: relative; animation: breathe 4400ms ease-in-out infinite; }
  .qr-card::after { content: ''; position: absolute; inset: -6px; border-radius: 26px; box-shadow: 0 0 0 0 rgba(217,164,65,.55); animation: brandPulse 2600ms cubic-bezier(.3,.7,.4,1) infinite; pointer-events: none; }
  @keyframes brandPulse {
    0% { box-shadow: 0 0 0 0 rgba(217,164,65,.5), 0 0 0 0 rgba(116,66,20,.25); }
    60% { box-shadow: 0 0 0 10px rgba(217,164,65,0), 0 0 0 18px rgba(116,66,20,0); }
    100% { box-shadow: 0 0 0 10px rgba(217,164,65,0), 0 0 0 18px rgba(116,66,20,0); }
  }
  @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.035); } }
  .qr-sq { width: 260px; height: 260px; border-radius: 10px; background: #fff; display: flex; align-items: center; justify-content: center; }
  .qr-sq svg { width: 100%; height: 100%; }

  .fallback-url { font: 600 12px var(--font-body); color: var(--text-secondary); margin-top: 14px; letter-spacing: .02em; }
  .fallback-url b { color: var(--gold-700); }

  .trust-strip { display: flex; gap: 26px; margin-top: 28px; }
  .stat { font: 700 22px/1 var(--font-display); color: var(--gold-700); }
  .stat-lbl { font: 600 11px var(--font-body); letter-spacing: .09em; color: var(--text-muted); margin-top: 4px; }

  @media (prefers-reduced-motion: reduce) { .eyebrow, .qr-card, .qr-card::after { animation: none !important; } }
</style>
</head>
<body>

<div class="stage" id="stage">
<div class="screen">
  <div class="wm">

  </div>

    </div>
    <div class="trust-strip">
      <div><div class="stat">5+</div><div class="stat-lbl">COUNTRIES</div></div>
      <div><div class="stat">US$210B</div><div class="stat-lbl">ECONOMY</div></div>
    </div>
  </div>
</div>
</div>

<script>
function fit() {
  const stage = document.getElementById('stage');
  const scale = Math.min(window.innerWidth / 460, window.innerHeight / 940);
  stage.style.transform = `translate(-50%, -50%) scale(${scale})`;
}
fit();
window.addEventListener('resize', fit);
window.addEventListener('orientationchange', () => setTimeout(fit, 100));
if (window.visualViewport) window.visualViewport.addEventListener('resize', fit);
new ResizeObserver(fit).observe(document.documentElement);
</script>
</body>
</html>
