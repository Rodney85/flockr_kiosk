<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flockr — Kiosk Displays</title>
<link rel="stylesheet" href="./styles.css">
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh; background: var(--surface-page); font-family: var(--font-body);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: var(--space-6); padding: var(--space-6);
  }
  img.logo { height: 30px; }
  h1 { font: 600 22px/1.3 var(--font-display); color: var(--text-primary); text-align: center; }
  .cards { display: flex; gap: var(--space-5); flex-wrap: wrap; justify-content: center; }
  a.card {
    display: block; width: 260px; padding: var(--space-5); border-radius: var(--radius-lg);
    background: #fff; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-card);
    text-decoration: none; color: var(--text-secondary); transition: background 150ms, border-color 150ms;
  }
  a.card:hover { border-color: var(--gold-400); }
  a.card .eyebrow { font: 700 11px var(--font-body); letter-spacing: .1em; text-transform: uppercase; color: var(--gold-700); }
  a.card h2 { font: 600 18px var(--font-body); color: var(--text-primary); margin: 8px 0 6px; }
  a.card p { font: 14px/1.5 var(--font-body); color: var(--text-secondary); }
  footer { font: 600 12px var(--font-body); color: var(--text-muted); text-align: center; }
</style>
</head>
<body>
  <img class="logo" src="./assets/logo/flockr-lockup-horizontal.svg" alt="Flockr">
  <h1>Trade-Show Kiosk — Booth Rig</h1>
  <div class="cards">
    <a class="card" href="/display-1">
      <div class="eyebrow">Display 1</div>
      <h2>Info Loop</h2>
      <p>Unattended, auto-advancing 6-slide product story.</p>
    </a>
    <a class="card" href="/display-2">
      <div class="eyebrow">Display 2</div>
      <h2>QR Standby</h2>
      <p>Static QR scan screen, always-on.</p>
    </a>
  </div>
  <footer>Point kiosk hardware straight at /display-1 or /display-2.</footer>
</body>
</html>
